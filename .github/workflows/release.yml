#
# On creating a new tag, we publish our maven artifacts to the Datadatdat maven bucket.
#
name: Release

on: create

jobs:
  publish:
    name: Test and publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GO_MODULES_TOKEN }}
      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" > ~/.git-credentials
        shell: bash
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.1'
      - name: Configure Go for private modules
        run: |
          go env -w GOPRIVATE=github.com/datadatdat/*
          go env -w GONOPROXY=github.com/datadatdat/*
          go env -w GONOSUMDB=github.com/datadatdat/*
          go env -w GOPROXY=https://proxy.golang.org,direct
        shell: bash
        env:
          GOPRIVATE: github.com/datadatdat/*
          GONOPROXY: github.com/datadatdat/*
          GONOSUMDB: github.com/datadatdat/*
      - name: Build and test
        run: ./gradlew build -Pversion=${GITHUB_REF#refs/tags/}
        shell: bash
        env:
          GOPRIVATE: github.com/datadatdat/*
          GONOPROXY: github.com/datadatdat/*
          GONOSUMDB: github.com/datadatdat/*
          GIT_TERMINAL_PROMPT: 0
      - name: Publish jar
        run: ./gradlew publish -PmavenBucket=${{ secrets.MAVEN_BUCKET }} -Pversion=${GITHUB_REF#refs/tags/}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
