#

#
# We run a full build (including lint) on each pull request.
#
name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  buildandtest:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GO_MODULES_TOKEN }}
      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" > ~/.git-credentials
        shell: bash
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
      - name: Configure Go for private modules
        run: |
          go env -w GOPRIVATE=github.com/ditdotdev/*
          go env -w GONOPROXY=github.com/ditdotdev/*
          go env -w GONOSUMDB=github.com/ditdotdev/*
          go env -w GOPROXY=https://proxy.golang.org,direct
        shell: bash
        env:
          GOPRIVATE: github.com/ditdotdev/*
          GONOPROXY: github.com/ditdotdev/*
          GONOSUMDB: github.com/ditdotdev/*
      - name: Run Go security scanner (gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...
        shell: bash
        env:
          GOPRIVATE: github.com/ditdotdev/*
          GONOPROXY: github.com/ditdotdev/*
          GONOSUMDB: github.com/ditdotdev/*
          GIT_TERMINAL_PROMPT: 0
      - name: Build and test
        run: ./gradlew build --info
        shell: bash
        env:
          GOPRIVATE: github.com/ditdotdev/*
          GONOPROXY: github.com/ditdotdev/*
          GONOSUMDB: github.com/ditdotdev/*
          GIT_TERMINAL_PROMPT: 0
